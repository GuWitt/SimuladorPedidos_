<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimuladorPedido</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <!-- Conteiner principal da página-->
    <div class="Container">
        <!-- Título principal-->
         <h1> 🍟 Simulador de Pedido do TDS261T </h1>
         <!-- Subtitulo-->
          
  </div>  
       <div class="logo">
            <img src="Assets/mcd.png" alt="mc" >
           
        </div>

        
      <!-- Area que contem todos os produtos -->
        <div class ="cards">
            
            <!-- Card = produto-->
            <!-- Usamos label para que cliclar no card marque checkbox-->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado-->
             <span> R$ 32,50 </span>
                <input type="Checkbox" id="hamburguer">
               <!-- imagem do produto -->
             <img src="Assets/Burger.png" alt="Hambúrguer">
             <!-- nome do produto -->
              <h2> Hambúrguer </h2>
              <p> Pão, carne, queijo, tomate, alface e cebola </p>   
              <!-- Preço -->
               
            </label>
            
            <!-- batata frita -->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado-->
                  <span> R$ 16,50 </span>
             <input type="Checkbox" id="batata">
              <!-- imagem do produto -->
             <img src="Assets/BatataMC.png" alt="Batata">
             <!-- nome do produto -->
              <h2> Batata frita </h2>
              <p> Batata frita 350g, maionese caseira e sal </p>   
              <!-- Preço -->
              
            </label>

            <!-- Refri -->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado-->
             <span> R$ 12,50 </span>
                <input type="Checkbox" id="refrigerante">
              <!-- imagem do produto -->
             <img src="Assets/Coca.png" alt="refrigerante">
             <!-- nome do produto -->
              <h2> Refrigerante </h2>
              <p> Refrigerante 450ml, Coca-cola, Sprite, Pepsi e Fanta </p>   
              <!-- Preço -->
               
            </label>

            <!-- Nuggets -->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado-->
             <span> R$ 16,50 </span>
                <input type="Checkbox" id="nuggets">
              <!-- imagem do produto -->
             <img src="Assets/Nuggets.png" alt="nuggets">
             <!-- nome do produto -->
              <h2> Nuggets  </h2>
              <p> Nuggests 350g, maionese caseira e ketchup </p>   
         <!-- Preço -->
            </label>
             
         <!-- Sorvete -->
            <label class="card">
                <!-- Checkbox que identifica se o item está selecionado-->
             <span> R$ 12,50 </span>
                <input type="Checkbox" id="sorvete">
              <!-- imagem do produto -->
             <img src="Assets/Sorvete.png" alt="sorvete">
             <!-- nome do produto -->
              <h2> Sorvete  </h2>
              <p> Sorvete 350ml, flocos, chocolate, morango e oreo </p>   
         <!-- Preço -->
             </label>

         <label class="card">
                <!-- Checkbox que identifica se o item está selecionado-->
             <span> R$ 2,00 </span>
                <input type="Checkbox" id="Molhos">
               <!-- imagem do produto -->
             <img src="Assets/Molho.png" alt="Molhos">
             <!-- nome do produto -->
              <h2> Molhos </h2>
              <p> Molhos 90g , Ranch, Tasty, Big Mac e Agridoce </p>   
              <!-- Preço -->
               
            </label>

         </div>
       <!-- BOTÃO que chama a função calcular() para somar o pedido-->
        <button onclick="calcular()"> Calcular Pedido </button>
        <!-- Área de resultado do pedido-->
     </div id="resultado" class="resultado"></div>
    </div>

</body>
</html>
